version: 1
disable_existing_loggers: False

formatters:
  json_pretty:
    # Use the class from the installed library
    '()': tctk.log_formatter.ColoredJsonFormatter
    # include pathname and lineno so JSON contains file and line info
    format: "%(name)s %(levelname)s %(pathname)s %(lineno)d %(asctime)s %(message)s"
    rename_fields:
      levelname: level
      asctime: timestamp
      pathname: file_path
      lineno: line_number
    static_fields:
      service: my-app
      env: dev

handlers:
  console_handler:
    class: logging.StreamHandler
    formatter: json_pretty
    stream: ext://sys.stdout
  file_handler:
    class: logging.handlers.RotatingFileHandler
    formatter: json_pretty
    filename: tctk.log  # resolved at runtime by Config.logger()
    maxBytes: 5242880
    backupCount: 3

root:
  level: WARNING
  handlers: [console_handler, file_handler]

loggers:
  __main__:
    level: DEBUG
    handlers: [console_handler, file_handler]
    propagate: no
  tctk:
    level: DEBUG
    handlers: [console_handler, file_handler]
    propagate: no
